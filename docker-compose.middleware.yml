# ============================================================
# DeltaTest 中间件本地开发 Docker Compose
# DeltaTest Middleware Local Development Docker Compose
# ============================================================
# 启动: docker compose -f docker-compose.middleware.yml up -d
# Start: docker compose -f docker-compose.middleware.yml up -d
# 停止: docker compose -f docker-compose.middleware.yml down
# Stop:  docker compose -f docker-compose.middleware.yml down
# ============================================================

services:
  # ==================== MySQL 8.0 ====================
  mysql:
    image: mysql:8.0
    container_name: deltatest-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-deltatest}
      MYSQL_USER: ${MYSQL_USER:-deltatest}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-deltatest}
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - mysql-conf:/etc/mysql/conf.d
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==================== Redis 7 ====================
  redis:
    image: redis:7-alpine
    container_name: deltatest-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-} --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==================== RabbitMQ 3.13 (Management) ====================
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: deltatest-rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ==================== MinIO (对象存储) ====================
  minio:
    image: minio/minio:latest
    container_name: deltatest-minio
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # Console UI
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

# ==================== 持久化卷 / Persistent Volumes ====================
volumes:
  mysql-data:
    name: deltatest-mysql-data
  redis-data:
    name: deltatest-redis-data
  rabbitmq-data:
    name: deltatest-rabbitmq-data
  minio-data:
    name: deltatest-minio-data
