# ============================================================
# DeltaTest AI 服务本地开发 Docker Compose
# DeltaTest AI Service Local Development Docker Compose
# ============================================================

services:
  delta-test-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: delta-test-ai
    ports:
      - "8000:8000"
    environment:
      - SERVICE_HOST=0.0.0.0
      - SERVICE_PORT=8000
      - LOG_LEVEL=DEBUG
      - JAVA_SERVICE_URL=http://host.docker.internal:8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/api/health'); assert r.status_code == 200"]
      interval: 30s
      timeout: 10s
      retries: 3
